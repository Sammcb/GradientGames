name: Secure
on: workflow_call
permissions: {}
jobs:
  secrets:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
    - uses: ./.github/actions/setup-nix
    - name: Scan secrets
      run: nix develop .#scanSecrets -c trufflehog git file://. --branch "${SHA}" --fail --github-actions --results=verified,unknown
      env:
        SHA: ${{ github.sha }}
